<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semus</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .writing-tip { margin: -8px 0 20px; padding: 16px 19px; border: 2px solid #f1d28a; border-radius: 16px; background: #fff9e9; color: #654d15; font-size: 17px; line-height: 1.55; }
      .writing-tip strong { font-size: 20px; }
      .writing-tip span { font-size: 15px; color: #756531; }
      .item-card { margin: 18px 0; padding: 18px; border: 2px solid #d7e9f4; border-radius: 18px; background: #fbfdff; }
      .item-card h3 { margin: 0 0 4px; color: #176394; font-size: 20px; }
      .item-card h3 small { color: #657a8d; font-size: 14px; }
      .item-card .party-form { padding-bottom: 0; }
      select { display: block; width: 100%; height: 55px; margin-top: 7px; padding: 10px 15px; border: 2px solid #c8d9e7; border-radius: 13px; background: #fff; color: #1c3652; font: 600 18px "Noto Sans KR", "Malgun Gothic", sans-serif; }
      select:focus { outline: 0; border-color: #0878bf; box-shadow: 0 0 0 4px #bfe8fb; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand"><span class="brand-mark">₩</span><div><strong>세금계산서 쉬운 도우미</strong><span>사진 한 장으로 시작하세요</span></div></div>
        <div class="help"><span>?</span><div><b>도움이 필요하세요?</b><small>천천히 하나씩 같이 해요</small></div></div>
      </div>
    </header>
    <main class="app-shell">
      <aside class="guide-panel" aria-label="진행 단계">
        <p class="eyebrow">쉬운 3단계</p>
        <h2>지금 어디까지<br />왔나요?</h2>
        <ol id="steps">
          <li class="active"><span class="step-number">1</span><div><b>사진 찍기</b><small>종이 계산서를 보여주세요</small></div></li>
          <li><span class="step-number">2</span><div><b>내용 확인</b><small>틀린 곳만 고쳐주세요</small></div></li>
          <li><span class="step-number">3</span><div><b>자동 입력</b><small>모의 홈택스에 채워드려요</small></div></li>
        </ol>
        <div class="privacy-note"><span>🔒</span><p><b>안심하세요</b><br />사진은 입력을 돕는 동안에만 사용해요.</p></div>
      </aside>
      <section class="workspace">
        <div class="workspace-top"><div><p id="progress">1 / 3 단계</p><div class="progress-track"><span id="progress-fill"></span></div></div><span class="calm-badge">천천히 해도 괜찮아요</span></div>
        <div id="panel" class="content-panel"></div>
        <div class="actions"><button id="back" class="secondary">← 이전으로</button><button id="next" class="primary">다음으로 →</button></div>
      </section>
    </main>
    <div id="toast" role="status" aria-live="polite"></div>
    <script src="renderer.js"></script>
  </body>
</html>
