<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>모의 홈택스</title><style>body{font-family:Arial,"Malgun Gothic";max-width:760px;margin:40px auto;background:#f4f7fb;padding:20px}.box{background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px #0001}h1{color:#1759a6}label{display:block;margin:15px 0;font-weight:bold}input{display:block;width:100%;padding:10px;margin-top:6px;box-sizing:border-box}button{margin-top:24px;padding:13px 20px;background:#155fb5;color:white;border:0;border-radius:6px;font-weight:bold}.hidden{display:none}.success{padding:20px;background:#e6f7ed;color:#167044;font-size:20px;font-weight:bold;border-radius:8px}</style></head><body><div class="box"><h1>모의 홈택스</h1><section id="start"><p>전자세금계산서 발급 연습 사이트입니다.</p><button>전자세금계산서 발급하기</button></section><form id="form" class="hidden"><label>공급받는 분 사업자등록번호<input aria-label="공급받는 분 사업자등록번호"></label><label>공급받는 분 상호<input aria-label="공급받는 분 상호"></label><label>품목<input aria-label="품목"></label><label>공급가액<input aria-label="공급가액"></label><label>작성일<input aria-label="작성일" type="date"></label><button type="button" id="check">내용 확인하기</button></form><section id="confirm" class="hidden"><h2>작성 내용을 확인해 주세요</h2><button id="complete">발급 완료</button></section><section id="success" class="hidden success">발급이 완료되었습니다</section></div><script>const $=s=>document.querySelector(s);$('#start button').onclick=()=>{$('#start').classList.add('hidden');$('#form').classList.remove('hidden')};$('#check').onclick=()=>{$('#form').classList.add('hidden');$('#confirm').classList.remove('hidden')};$('#complete').onclick=()=>{$('#confirm').classList.add('hidden');$('#success').classList.remove('hidden')}</script></body></html>
